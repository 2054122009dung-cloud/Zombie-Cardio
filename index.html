<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Loop: Horde Survival</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body onload="init()">

<div id="game-container">
    
    <div id="header">
        <h1>Horde Survival</h1>
        <div class="stats-grid">
            <div class="stat-box" id="loot-display">Scrap: 0</div>
            <div class="stat-box">Dmg: <span id="player-dmg-txt" style="color:#fff">10</span></div>
            <div class="stat-box">Crit x<span id="player-crit-txt" style="color:#fff">3.0</span></div>
            <div class="stat-box" id="weapon-display" onclick="swapWeapon()">Wep: RANGED</div>
        </div>
        <div class="hp-bar-container" style="margin-top: 15px;">
            <div id="player-hp-fill" class="hp-bar-fill player-hp-fill"></div>
            <div id="player-hp-txt" class="hp-text">100 / 100 HP</div>
        </div>
    </div>

    <div id="arena" onclick="createHitSpark(event)">
        <div id="wave-ui">WAVE: <span id="wave-txt">1</span></div>
        <div id="horde-info">
            ZOMBIES LEFT: <span id="zombies-left-txt" style="color: #fff">0</span>
        </div>
        
        <div id="zombies-layer">
            </div>
    </div>

    <div id="shop">
        <h2>--- Tactical Skills ---</h2>
        <div class="shop-grid">
            <div class="upgrade-btn skill-btn" id="btn-grenade" onclick="useGrenade()">
                <span class="upg-title">🧨 Throw Frag (AOE)</span>
                <span class="upg-cost" id="cost-grenade">15 Scrap</span>
            </div>
            <button class="upgrade-btn skill-btn" id="btn-upg-turret" onclick="buyUpgrade('turret')">
                <span class="upg-title">🤖 Auto-Turret</span>
                <span class="upg-cost" id="cost-turret">60 Scrap</span>
            </button>
        </div>

        <h2>--- Workbench ---</h2>
        <button class="upgrade-btn" style="width: 100%; margin-bottom: 10px; border-color: #4caf50;" id="btn-heal" onclick="healPlayer()">
            <span class="upg-title">🩹 Use Medkit (Restore HP)</span>
            <span class="upg-cost" id="cost-heal">5 Scrap</span>
        </button>

        <div class="shop-grid">
            <button class="upgrade-btn" id="btn-upg-dmg" onclick="buyUpgrade('dmg')">
                <span class="upg-title">🔪 Sharpen Weapon</span>
                <span class="upg-cost" id="cost-dmg">15 Scrap</span>
            </button>
            <button class="upgrade-btn" id="btn-upg-hp" onclick="buyUpgrade('hp')">
                <span class="upg-title">🛡️ Plating (+HP)</span>
                <span class="upg-cost" id="cost-hp">20 Scrap</span>
            </button>
            <button class="upgrade-btn" id="btn-upg-scope" onclick="buyUpgrade('scope')">
                <span class="upg-title">🔭 Sniper Scope</span>
                <span class="upg-cost" id="cost-scope">40 Scrap</span>
            </button>
            <button class="upgrade-btn" id="btn-upg-trap" onclick="buyUpgrade('trap')">
                <span class="upg-title">🕸️ Barbed Wire (Slow)</span>
                <span class="upg-cost" id="cost-trap">50 Scrap</span>
            </button>
        </div>
    </div>

    <div id="death-screen" class="overlay-screen">
        <h2>YOU DIED</h2>
        <p style="margin-bottom: 25px; color: #aaa; font-size: 18px;">Overrun by the horde.</p>
        <button class="action-btn" onclick="respawn()">Respawn (Lose 20% Scrap)</button>
    </div>

    <div id="wave-screen" class="overlay-screen">
        <h2>WAVE CLEARED</h2>
        <p style="margin-bottom: 25px; color: #aaa; font-size: 18px;">Catch your breath. Upgrade your gear.</p>
        <button class="action-btn" onclick="startNextWave()">Start Next Wave</button>
    </div>

</div>


<script src="script.js"></script>
</body>
</html>
